<div class="admin-page-head">
  <h1>Register New Admin</h1>
  <p class="sub">Create a login for another authorized admin.</p>
</div>

@if (registrationComplete) {
  <div class="success-card">
    <div class="success-icon">✓</div>
    <h3>Successfully Registered</h3>
    <p>The new admin account has been created and can now log in.</p>
    <button class="btn-brass" (click)="registerAnother()">Register another admin</button>
  </div>
} @else {
  <div class="register-form-card">
    @if (errorMessage) {
      <div class="admin-error-msg">{{ errorMessage }}</div>
    }

    <div class="field-row">
      <div>
        <label class="field-label">First name</label>
        <input class="field" [(ngModel)]="firstName" placeholder="Ali" />
      </div>
      <div>
        <label class="field-label">Last name</label>
        <input class="field" [(ngModel)]="lastName" placeholder="Khan" />
      </div>
    </div>

    <label class="field-label">Email</label>
    <input class="field" type="email" [(ngModel)]="email" placeholder="admin@dialera.com" />

    <label class="field-label">Password</label>
    <input class="field" type="password" [(ngModel)]="password" placeholder="Must include A-z, 0-9, symbol" />

    <label class="field-label">Phone</label>
    <input class="field" [(ngModel)]="phone" placeholder="03001234567" />

    <button class="btn-brass" [disabled]="submitting" (click)="onSubmit()">
      {{ submitting ? 'Registering...' : 'Register admin' }}
    </button>
  </div>
}
